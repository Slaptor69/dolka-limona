services:
  backend:
    build:
      context: ./backend
    container_name: magnit-dashboard-backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: magnit-dashboard-frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: magnit-dashboard-caddy
    depends_on:
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
